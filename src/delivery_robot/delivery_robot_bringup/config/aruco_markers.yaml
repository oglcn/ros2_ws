# ArUco marker map -- known marker positions in the map frame
# Each marker has an ID and its position (x, y, z) in meters.
# Orientation is assumed to be facing the camera (flat on wall/surface).
#
# Coordinate system:
#   x-axis: along the surface (left-to-right facing markers)
#   y-axis: perpendicular to surface (toward robot)
#   z: height from ground (to marker center)
#
# Portable calibration board:
#   Both markers 17x17cm, bottom edge 20cm from floor
#   Inner edge spacing: 35cm → center-to-center: 52cm

marker_size: 0.17  # marker side length in meters
dictionary: DICT_4X4_50
anchors: [1, 2]

markers:
  # id1 -- origin marker (left side from robot's perspective)
  1:
    x: 0.0
    y: 0.0
    z: 0.285
  # id2 -- 52cm to the right of id1
  2:
    x: -0.52
    y: 0.0
    z: 0.285
