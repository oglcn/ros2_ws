<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Delivery Robot</title>
<style>
:root {
  --bg: #0f172a; --surface: #1e293b; --border: #334155;
  --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8;
  --green: #22c55e; --red: #ef4444; --yellow: #eab308;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
}
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: .75rem 1rem; background: var(--surface); border-bottom: 1px solid var(--border);
}
header h1 { font-size: 1.1rem; color: var(--accent); }
.conn { display:flex; align-items:center; gap:.4rem; font-size:.8rem; }
.conn .dot { width:8px; height:8px; border-radius:50%; background:var(--red); }
.conn.ok .dot { background: var(--green); }

.layout {
  display: grid; gap: .75rem; padding: .75rem;
  grid-template-columns: 1fr;
  max-width: 1400px; margin: 0 auto;
}
@media(min-width:768px) {
  .layout { grid-template-columns: 2fr 1fr; }
  .cam-panel { grid-row: 1/3; }
}
@media(min-width:1100px) {
  .layout { grid-template-columns: 2fr 1fr 1fr; }
  .cam-panel { grid-row: 1/3; }
}

.panel {
  background: var(--surface); border-radius: 10px;
  border: 1px solid var(--border); overflow: hidden;
}
.panel-head {
  padding: .5rem .75rem; font-size: .75rem; font-weight: 600;
  color: var(--muted); text-transform: uppercase; letter-spacing: .05em;
  border-bottom: 1px solid var(--border);
}

/* Camera */
.cam-panel { position: relative; }
.cam-panel .cam-wrap { position: relative; display: block; }
.cam-panel img { display:block; width:100%; height:auto; background:#000; }
#aruco-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
}
.cam-fullscreen-btn {
  position: absolute; top: .5rem; right: .5rem; z-index: 10;
  background: rgba(15,23,42,0.7); border: 1px solid var(--border);
  color: var(--muted); border-radius: 6px; padding: 6px 8px;
  cursor: pointer; font-size: .75rem; line-height: 1;
  transition: background .2s, color .2s;
}
.cam-fullscreen-btn:hover { background: var(--accent); color: #0f172a; }
.cam-panel:fullscreen { background: #000; display: flex; align-items: center; justify-content: center; }
.cam-panel:fullscreen .panel-head { display: none; }
.cam-panel:fullscreen .cam-wrap { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
.cam-panel:fullscreen img { width: auto; height: 100%; max-width: 100%; object-fit: contain; }

/* Joystick */
.joy-area {
  display: flex; flex-direction: column; align-items: center;
  padding: 1rem; gap: .75rem;
}
#joystick-zone {
  width: 200px; height: 200px; border-radius: 50%;
  background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
  border: 2px solid var(--border); position: relative;
  touch-action: none; cursor: crosshair;
}
#joy-knob {
  width: 60px; height: 60px; border-radius: 50%;
  background: var(--accent); opacity: .85;
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none; transition: none;
}
#joy-vector {
  position:absolute; top:50%; left:50%; width:2px;
  background: var(--accent); transform-origin: bottom center;
  pointer-events:none; opacity:.5;
}

/* Rotation slider */
.rot-row { display:flex; align-items:center; gap:.5rem; width:100%; }
.rot-row label { font-size:.75rem; color:var(--muted); white-space:nowrap; }
#rot-slider { flex:1; accent-color: var(--accent); }

/* Speed slider */
.speed-row { display:flex; align-items:center; gap:.5rem; width:100%; }
.speed-row label { font-size:.75rem; color:var(--muted); white-space:nowrap; }
#speed-slider { flex:1; accent-color: var(--accent); }
#speed-val { font-size:.8rem; font-family:monospace; min-width:3ch; }

/* Keyboard hints */
.keys { display:grid; grid-template-columns:repeat(5,1fr); gap:4px; width:100%; }
.key {
  text-align:center; padding:6px 2px; border-radius:6px;
  background: var(--bg); border:1px solid var(--border);
  font-size:.7rem; font-family:monospace; color:var(--muted);
  transition: background .1s, color .1s;
}
.key.active { background:var(--accent); color:#0f172a; border-color:var(--accent); }
.key small { display:block; font-size:.55rem; margin-top:2px; opacity:.7; }

/* Motor status */
.motor-grid { display:grid; grid-template-columns:1fr 1fr; gap:.5rem; padding:.75rem; }
.motor-card {
  padding:.5rem; border-radius:8px; background:var(--bg);
  border:1px solid var(--border); text-align:center;
}
.motor-card .name { font-size:.7rem; color:var(--muted); margin-bottom:4px; }
.motor-bar-bg {
  height:8px; border-radius:4px; background:var(--border); overflow:hidden;
  position:relative;
}
.motor-bar-bg::after {
  content:''; position:absolute; top:0; left:50%;
  width:2px; height:100%; background:var(--muted); opacity:.5;
  transform:translateX(-1px);
}
.motor-bar {
  position:absolute; top:0; height:100%; border-radius:4px;
  transition: left .15s, width .15s;
  width:0%;
}
.motor-bar.fwd { background:var(--accent); left:50%; }
.motor-bar.rev { background:var(--yellow); right:50%; }
.motor-val { font-size:.7rem; font-family:monospace; margin-top:3px; }
.motor-dir { font-size:.6rem; color:var(--muted); }

/* Mode */
.mode-row { display:flex; gap:.5rem; padding:.75rem; }
.mode-btn {
  flex:1; padding:.5rem; border-radius:8px; border:1px solid var(--border);
  background:var(--bg); color:var(--muted); font-size:.8rem; cursor:pointer;
}
.mode-btn.active { background:var(--accent); color:#0f172a; border-color:var(--accent); font-weight:600; }
.mode-btn:disabled { opacity:.4; cursor:not-allowed; }

/* Localization status panel */
.loc-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; padding: .75rem;
}
.loc-item {
  display: flex; align-items: center; gap: .4rem; font-size: .8rem;
}
.loc-item .dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.loc-item .label { color: var(--muted); font-size: .7rem; }
.loc-item .value { font-family: monospace; font-size: .8rem; }
.loc-pos {
  grid-column: 1 / -1; display: flex; gap: 1rem; padding-top: .25rem;
  font-family: monospace; font-size: .8rem;
}
.loc-pos span { color: var(--muted); }
.calib-section {
  padding: .75rem; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: .5rem; flex-wrap: wrap;
}
.calib-btn {
  padding: .4rem .75rem; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: .75rem; cursor: pointer;
}
.calib-btn:hover { border-color: var(--accent); }
.calib-btn.cancel { border-color: var(--red); color: var(--red); }
.calib-status { font-size: .75rem; color: var(--muted); }
.calib-rms { font-size: .75rem; color: var(--green); }

/* 2D Map */
.map-wrap { padding: .5rem; }
#map-canvas {
  width: 100%; aspect-ratio: 1; background: var(--bg);
  border-radius: 8px; border: 1px solid var(--border); display: block;
}

/* 3D Viewer */
.viewer-wrap { padding: .5rem; }
#three-container {
  width: 100%; aspect-ratio: 1; background: #000;
  border-radius: 8px; border: 1px solid var(--border); overflow: hidden;
  position: relative;
}
#three-container canvas { width: 100% !important; height: 100% !important; }
</style>
</head>
<body>

<header>
  <h1>Delivery Robot</h1>
  <div style="display:flex; align-items:center; gap:1rem;">
    <div class="conn" id="gamepad-status">
      <div class="dot"></div>
      <span>No Gamepad</span>
    </div>
    <div class="conn" id="conn">
      <div class="dot"></div>
      <span>Disconnected</span>
    </div>
  </div>
</header>

<div class="layout">
  <!-- Camera -->
  <div class="panel cam-panel" id="cam-panel">
    <div class="panel-head">Camera Feed</div>
    <div class="cam-wrap">
      <button class="cam-fullscreen-btn" id="cam-fs-btn" title="Toggle fullscreen">&#x26F6;</button>
      <img id="cam" src="/stream" alt="Camera">
      <canvas id="aruco-overlay"></canvas>
    </div>
  </div>

  <!-- Controls -->
  <div class="panel">
    <div class="panel-head">Controls</div>
    <div class="joy-area">
      <div id="joystick-zone">
        <div id="joy-knob"></div>
      </div>

      <div class="rot-row">
        <label>Rotate</label>
        <input type="range" id="rot-slider" min="-100" max="100" value="0" step="1">
        <label>QE</label>
      </div>

      <div class="speed-row">
        <label>Speed</label>
        <input type="range" id="speed-slider" min="10" max="100" value="100" step="5">
        <span id="speed-val">1.0x</span>
      </div>

      <div class="keys">
        <div class="key" data-key="q">Q<small>rot L</small></div>
        <div class="key" style="grid-column:2" data-key="w">W<small>fwd</small></div>
        <div class="key" data-key="e">E<small>rot R</small></div>
        <div class="key" data-key="a">A<small>left</small></div>
        <div class="key" style="grid-column:2" data-key="s">S<small>back</small></div>
        <div class="key" data-key="d">D<small>right</small></div>
        <div class="key" style="grid-column:4/6" data-key="shift">Shift<small>boost</small></div>
      </div>
    </div>
  </div>

  <!-- Motor Status -->
  <div class="panel">
    <div class="panel-head">Motor Status</div>
    <div class="motor-grid">
      <div class="motor-card" id="mc-fl"><div class="name">Front Left</div><div class="motor-bar-bg"><div class="motor-bar"></div></div><div class="motor-val">0%</div><div class="motor-dir"></div></div>
      <div class="motor-card" id="mc-fr"><div class="name">Front Right</div><div class="motor-bar-bg"><div class="motor-bar"></div></div><div class="motor-val">0%</div><div class="motor-dir"></div></div>
      <div class="motor-card" id="mc-rl"><div class="name">Rear Left</div><div class="motor-bar-bg"><div class="motor-bar"></div></div><div class="motor-val">0%</div><div class="motor-dir"></div></div>
      <div class="motor-card" id="mc-rr"><div class="name">Rear Right</div><div class="motor-bar-bg"><div class="motor-bar"></div></div><div class="motor-val">0%</div><div class="motor-dir"></div></div>
    </div>
    <div class="mode-row">
      <button class="mode-btn active" id="mode-manual">Manual</button>
      <button class="mode-btn" id="mode-auto" disabled>Autonomous</button>
    </div>
  </div>

  <!-- Localization Status -->
  <div class="panel" id="loc-panel">
    <div class="panel-head">Localization Status</div>
    <div class="loc-grid">
      <div class="loc-item">
        <div class="dot" id="vslam-dot" style="background:var(--muted)"></div>
        <div><div class="label">VSLAM</div><div class="value" id="vslam-state">--</div></div>
      </div>
      <div class="loc-item">
        <div class="dot" id="ekf-dot" style="background:var(--red)"></div>
        <div><div class="label">EKF</div><div class="value" id="ekf-state">Inactive</div></div>
      </div>
      <div class="loc-item">
        <div class="dot" style="background:var(--accent)"></div>
        <div><div class="label">ArUco Visible</div><div class="value" id="aruco-count">0</div></div>
      </div>
      <div class="loc-pos">
        <div>X: <span id="pos-x">--</span></div>
        <div>Y: <span id="pos-y">--</span></div>
        <div>Yaw: <span id="pos-yaw">--</span></div>
      </div>
    </div>
    <div class="calib-section" id="calib-section">
      <button class="calib-btn" id="calib-btn">Calibrate Camera</button>
      <span class="calib-status" id="calib-status"></span>
    </div>
  </div>

  <!-- 2D Map -->
  <div class="panel">
    <div class="panel-head">2D Map</div>
    <div class="map-wrap">
      <canvas id="map-canvas"></canvas>
    </div>
  </div>

  <!-- 3D Point Cloud -->
  <div class="panel">
    <div class="panel-head">3D Point Cloud</div>
    <div class="viewer-wrap">
      <div id="three-container"></div>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- 3D Point Cloud Viewer ---
const container = document.getElementById('three-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera3d = new THREE.PerspectiveCamera(60, 1, 0.1, 1000);
camera3d.position.set(3, 3, 3);
camera3d.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera3d, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;

const gridHelper = new THREE.GridHelper(10, 20, 0x334155, 0x1e293b);
scene.add(gridHelper);

const pointsGeometry = new THREE.BufferGeometry();
const pointsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.02, sizeAttenuation: true });
const pointsMesh = new THREE.Points(pointsGeometry, pointsMaterial);
scene.add(pointsMesh);

const robotSphere = new THREE.Mesh(
  new THREE.SphereGeometry(0.08, 16, 16),
  new THREE.MeshBasicMaterial({ color: 0x38bdf8 })
);
scene.add(robotSphere);

function resizeThree() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  if (w === 0 || h === 0) return;
  renderer.setSize(w, h);
  camera3d.aspect = w / h;
  camera3d.updateProjectionMatrix();
}
resizeThree();
new ResizeObserver(resizeThree).observe(container);

function animateThree() {
  requestAnimationFrame(animateThree);
  controls.update();
  renderer.render(scene, camera3d);
}
animateThree();

window._updatePointCloud = function(data) {
  if (!data || !data.points || data.points.length === 0) return;
  const pts = data.points;
  const positions = new Float32Array(pts.length * 3);
  for (let i = 0; i < pts.length; i++) {
    positions[i * 3] = pts[i][0];
    positions[i * 3 + 1] = pts[i][2] || 0;
    positions[i * 3 + 2] = pts[i][1];
  }
  pointsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  pointsGeometry.computeBoundingSphere();
};

window._updateRobot3D = function(x, y, yawDeg) {
  robotSphere.position.set(x, 0.08, y);
};
</script>

<script>
(function() {
  'use strict';

  // --- WebSocket ---
  let ws = null;
  const connEl = document.getElementById('conn');
  function wsConnect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onopen = () => {
      connEl.className = 'conn ok';
      connEl.querySelector('span').textContent = 'Connected';
    };
    ws.onclose = () => {
      connEl.className = 'conn';
      connEl.querySelector('span').textContent = 'Disconnected';
      setTimeout(wsConnect, 2000);
    };
    ws.onerror = () => ws.close();
    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        handleStatus(data);
        handleLocalization(data);
        handlePointCloud(data);
        handleCalibration(data);
      } catch(_) {}
    };
  }
  wsConnect();

  // --- Fullscreen ---
  document.getElementById('cam-fs-btn').addEventListener('click', () => {
    const panel = document.getElementById('cam-panel');
    if (!document.fullscreenElement) {
      panel.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  });

  function sendCmd(lx, ly, az) {
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({cmd_vel: {lx, ly, az}}));
    }
  }

  function wsSend(obj) {
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify(obj));
    }
  }

  // --- Motor status display ---
  const motorCards = ['fl','fr','rl','rr'].map(id => {
    const el = document.getElementById('mc-' + id);
    return {
      bar: el.querySelector('.motor-bar'),
      val: el.querySelector('.motor-val'),
      dir: el.querySelector('.motor-dir'),
    };
  });

  function handleStatus(data) {
    if (!data.status) return;
    const s = data.status;
    (s.duty_cycles || []).forEach((d, i) => {
      if (!motorCards[i]) return;
      const pct = Math.abs(d) * 100;
      const halfPct = pct / 2;
      const bar = motorCards[i].bar;
      if (d >= 0) {
        bar.className = 'motor-bar fwd';
        bar.style.left = '50%';
        bar.style.right = 'auto';
        bar.style.width = halfPct + '%';
      } else {
        bar.className = 'motor-bar rev';
        bar.style.right = '50%';
        bar.style.left = 'auto';
        bar.style.width = halfPct + '%';
      }
      const sign = d > 0.001 ? '+' : d < -0.001 ? '-' : '';
      motorCards[i].val.textContent = sign + pct.toFixed(0) + '%';
      motorCards[i].dir.textContent = d > 0.001 ? 'FWD' : d < -0.001 ? 'REV' : '';
    });
  }

  // --- Localization status ---
  const vslamDot = document.getElementById('vslam-dot');
  const vslamState = document.getElementById('vslam-state');
  const ekfDot = document.getElementById('ekf-dot');
  const ekfState = document.getElementById('ekf-state');
  const arucoCount = document.getElementById('aruco-count');
  const posX = document.getElementById('pos-x');
  const posY = document.getElementById('pos-y');
  const posYaw = document.getElementById('pos-yaw');

  let robotPos = { x: 0, y: 0, yaw: 0 };
  let breadcrumbs = [];
  const MAX_BREADCRUMBS = 100;
  let arucoDetections = [];

  function handleLocalization(data) {
    if (!data.localization) return;
    const loc = data.localization;

    const vslamColors = { initializing: 'var(--yellow)', tracking: 'var(--green)', lost: 'var(--red)' };
    vslamDot.style.background = vslamColors[loc.vslam_state] || 'var(--muted)';
    vslamState.textContent = loc.vslam_state || '--';

    ekfDot.style.background = loc.ekf_active ? 'var(--green)' : 'var(--red)';
    ekfState.textContent = loc.ekf_active ? 'Active' : 'Inactive';

    if (loc.position) {
      robotPos = { x: loc.position.x, y: loc.position.y, yaw: loc.position.yaw };
      posX.textContent = robotPos.x.toFixed(2);
      posY.textContent = robotPos.y.toFixed(2);
      posYaw.textContent = robotPos.yaw.toFixed(1) + '\u00b0';

      breadcrumbs.push({ x: robotPos.x, y: robotPos.y });
      if (breadcrumbs.length > MAX_BREADCRUMBS) breadcrumbs.shift();

      if (window._updateRobot3D) {
        window._updateRobot3D(robotPos.x, robotPos.y, robotPos.yaw);
      }
    }

    arucoDetections = loc.aruco_detections || [];
    arucoCount.textContent = arucoDetections.length;

    drawArucoOverlay();
    drawMap();
  }

  // --- Point Cloud ---
  function handlePointCloud(data) {
    if (!data.point_cloud) return;
    if (window._updatePointCloud) {
      window._updatePointCloud(data.point_cloud);
    }
  }

  // --- Calibration ---
  const calibBtn = document.getElementById('calib-btn');
  const calibStatus = document.getElementById('calib-status');
  let calibrating = false;
  let calibCorners = [];

  calibBtn.addEventListener('click', () => {
    if (!calibrating) {
      wsSend({ calibration: 'start' });
      calibrating = true;
      calibBtn.textContent = 'Cancel';
      calibBtn.classList.add('cancel');
      calibStatus.textContent = 'Starting...';
      calibStatus.className = 'calib-status';
    } else {
      wsSend({ calibration: 'stop' });
      calibrating = false;
      calibBtn.textContent = 'Calibrate Camera';
      calibBtn.classList.remove('cancel');
      calibStatus.textContent = 'Cancelled';
      calibCorners = [];
      drawArucoOverlay();
    }
  });

  function handleCalibration(data) {
    if (!data.calibration) return;
    const cal = data.calibration;

    if (cal.state === 'detecting') {
      calibrating = true;
      calibBtn.textContent = 'Cancel';
      calibBtn.classList.add('cancel');
      calibStatus.textContent = cal.frames + '/' + cal.total;
      calibStatus.className = 'calib-status';
      calibCorners = cal.found && cal.corners ? cal.corners : [];
      drawArucoOverlay();
    } else if (cal.state === 'complete') {
      calibrating = false;
      calibBtn.textContent = 'Calibrate Camera';
      calibBtn.classList.remove('cancel');
      calibStatus.textContent = 'RMS: ' + cal.rms_error.toFixed(3);
      calibStatus.className = 'calib-rms';
      calibCorners = [];
      drawArucoOverlay();
    }
  }

  // --- ArUco overlay ---
  const camImg = document.getElementById('cam');
  const overlayCanvas = document.getElementById('aruco-overlay');
  const overlayCtx = overlayCanvas.getContext('2d');

  function drawArucoOverlay() {
    const w = camImg.clientWidth;
    const h = camImg.clientHeight;
    if (w === 0 || h === 0) return;
    overlayCanvas.width = w;
    overlayCanvas.height = h;
    overlayCtx.clearRect(0, 0, w, h);

    const sx = w / 640;
    const sy = h / 480;

    // Draw ArUco detections as green quads
    if (arucoDetections.length > 0) {
      overlayCtx.strokeStyle = '#22c55e';
      overlayCtx.lineWidth = 2;
      overlayCtx.font = '12px monospace';
      overlayCtx.fillStyle = '#22c55e';

      for (const det of arucoDetections) {
        if (!det.corners || det.corners.length < 4) continue;
        overlayCtx.beginPath();
        overlayCtx.moveTo(det.corners[0][0] * sx, det.corners[0][1] * sy);
        for (let i = 1; i < det.corners.length; i++) {
          overlayCtx.lineTo(det.corners[i][0] * sx, det.corners[i][1] * sy);
        }
        overlayCtx.closePath();
        overlayCtx.stroke();

        const cx = det.corners.reduce((s, c) => s + c[0], 0) / det.corners.length * sx;
        const cy = det.corners.reduce((s, c) => s + c[1], 0) / det.corners.length * sy;
        overlayCtx.fillText('ID:' + det.id, cx - 10, cy - 8);
      }
    }

    // Draw calibration corners in rainbow
    if (calibrating && calibCorners.length > 0) {
      const total = calibCorners.length;
      for (let i = 0; i < total; i++) {
        const hue = (i / total) * 360;
        overlayCtx.fillStyle = 'hsl(' + hue + ', 100%, 60%)';
        const px = calibCorners[i][0] * sx;
        const py = calibCorners[i][1] * sy;
        overlayCtx.beginPath();
        overlayCtx.arc(px, py, 3, 0, Math.PI * 2);
        overlayCtx.fill();
      }
    }
  }

  // Redraw overlay when image resizes
  new ResizeObserver(drawArucoOverlay).observe(camImg);

  // --- 2D Map ---
  const mapCanvas = document.getElementById('map-canvas');
  const mapCtx = mapCanvas.getContext('2d');
  let markers = [];

  // Fetch marker positions
  fetch('/api/markers').then(r => r.json()).then(data => {
    markers = data || [];
    drawMap();
  }).catch(() => {});

  function drawMap() {
    const dpr = window.devicePixelRatio || 1;
    const displayW = mapCanvas.clientWidth;
    const displayH = mapCanvas.clientHeight;
    if (displayW === 0 || displayH === 0) return;
    mapCanvas.width = displayW * dpr;
    mapCanvas.height = displayH * dpr;
    mapCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

    mapCtx.fillStyle = '#0f172a';
    mapCtx.fillRect(0, 0, displayW, displayH);

    // Compute bounds from markers + robot + breadcrumbs
    let allPts = markers.map(m => ({ x: m.x || m.position_x || 0, y: m.y || m.position_y || 0 }));
    allPts.push(robotPos);
    allPts = allPts.concat(breadcrumbs);

    if (allPts.length === 0) return;

    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const p of allPts) {
      if (p.x < minX) minX = p.x;
      if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.y > maxY) maxY = p.y;
    }

    // Add padding
    const pad = 0.5;
    minX -= pad; maxX += pad; minY -= pad; maxY += pad;
    const rangeX = maxX - minX || 1;
    const rangeY = maxY - minY || 1;

    // Scale to fit keeping aspect ratio
    const mapPad = 20;
    const usableW = displayW - mapPad * 2;
    const usableH = displayH - mapPad * 2;
    const scale = Math.min(usableW / rangeX, usableH / rangeY);

    function toScreen(px, py) {
      const sx = mapPad + (px - minX) * scale + (usableW - rangeX * scale) / 2;
      const sy = mapPad + (maxY - py) * scale + (usableH - rangeY * scale) / 2;
      return [sx, sy];
    }

    // Grid lines
    mapCtx.strokeStyle = '#1e293b';
    mapCtx.lineWidth = 0.5;
    const gridStep = Math.pow(10, Math.floor(Math.log10(rangeX))) || 1;
    for (let gx = Math.floor(minX / gridStep) * gridStep; gx <= maxX; gx += gridStep) {
      const [sx] = toScreen(gx, 0);
      mapCtx.beginPath(); mapCtx.moveTo(sx, mapPad); mapCtx.lineTo(sx, displayH - mapPad); mapCtx.stroke();
    }
    for (let gy = Math.floor(minY / gridStep) * gridStep; gy <= maxY; gy += gridStep) {
      const [, sy] = toScreen(0, gy);
      mapCtx.beginPath(); mapCtx.moveTo(mapPad, sy); mapCtx.lineTo(displayW - mapPad, sy); mapCtx.stroke();
    }

    // Draw markers as labeled squares
    mapCtx.fillStyle = '#eab308';
    mapCtx.strokeStyle = '#eab308';
    mapCtx.lineWidth = 1;
    mapCtx.font = '10px monospace';
    mapCtx.textAlign = 'center';
    for (const m of markers) {
      const mx = m.x !== undefined ? m.x : (m.position_x || 0);
      const my = m.y !== undefined ? m.y : (m.position_y || 0);
      const [sx, sy] = toScreen(mx, my);
      mapCtx.fillRect(sx - 5, sy - 5, 10, 10);
      mapCtx.fillStyle = '#eab308';
      const label = m.id !== undefined ? m.id : (m.marker_id !== undefined ? m.marker_id : '');
      mapCtx.fillText('' + label, sx, sy - 8);
    }

    // Draw breadcrumbs
    if (breadcrumbs.length > 1) {
      mapCtx.strokeStyle = 'rgba(56,189,248,0.3)';
      mapCtx.lineWidth = 1.5;
      mapCtx.beginPath();
      const [bx0, by0] = toScreen(breadcrumbs[0].x, breadcrumbs[0].y);
      mapCtx.moveTo(bx0, by0);
      for (let i = 1; i < breadcrumbs.length; i++) {
        const [bx, by] = toScreen(breadcrumbs[i].x, breadcrumbs[i].y);
        mapCtx.lineTo(bx, by);
      }
      mapCtx.stroke();
    }

    // Draw robot as directional triangle
    const [rx, ry] = toScreen(robotPos.x, robotPos.y);
    const yawRad = -(robotPos.yaw * Math.PI / 180);
    const triSize = 10;
    mapCtx.save();
    mapCtx.translate(rx, ry);
    mapCtx.rotate(yawRad);
    mapCtx.fillStyle = '#38bdf8';
    mapCtx.beginPath();
    mapCtx.moveTo(triSize, 0);
    mapCtx.lineTo(-triSize * 0.6, -triSize * 0.6);
    mapCtx.lineTo(-triSize * 0.6, triSize * 0.6);
    mapCtx.closePath();
    mapCtx.fill();
    mapCtx.restore();
  }

  new ResizeObserver(drawMap).observe(mapCanvas);

  // --- Speed multiplier ---
  const speedSlider = document.getElementById('speed-slider');
  const speedVal = document.getElementById('speed-val');
  let speedMult = 1.0;
  speedSlider.addEventListener('input', () => {
    speedMult = parseInt(speedSlider.value) / 100;
    speedVal.textContent = speedMult.toFixed(1) + 'x';
  });

  // --- Joystick ---
  const zone = document.getElementById('joystick-zone');
  const knob = document.getElementById('joy-knob');
  let joyActive = false;
  let joyX = 0, joyY = 0;

  function joyPos(e) {
    const rect = zone.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const r = rect.width / 2 - 30;
    let clientX, clientY;
    if (e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
    else { clientX = e.clientX; clientY = e.clientY; }
    let dx = clientX - cx, dy = clientY - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > r) { dx = dx/dist*r; dy = dy/dist*r; }
    return {dx, dy, nx: dx/r, ny: -dy/r};
  }

  function joyStart(e) {
    e.preventDefault(); joyActive = true;
    joyMove(e);
  }
  function joyMove(e) {
    if (!joyActive) return;
    e.preventDefault();
    const {dx, dy, nx, ny} = joyPos(e);
    knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    joyX = nx; joyY = ny;
    if (Math.abs(joyX) < 0.08) joyX = 0;
    if (Math.abs(joyY) < 0.08) joyY = 0;
  }
  function joyEnd() {
    joyActive = false; joyX = 0; joyY = 0;
    knob.style.transform = 'translate(-50%, -50%)';
  }

  zone.addEventListener('mousedown', joyStart);
  zone.addEventListener('touchstart', joyStart, {passive:false});
  window.addEventListener('mousemove', joyMove);
  window.addEventListener('touchmove', joyMove, {passive:false});
  window.addEventListener('mouseup', joyEnd);
  window.addEventListener('touchend', joyEnd);

  // --- Rotation slider ---
  const rotSlider = document.getElementById('rot-slider');
  let rotVal = 0;
  rotSlider.addEventListener('input', () => { rotVal = parseInt(rotSlider.value) / 100; });
  rotSlider.addEventListener('mouseup', () => { rotSlider.value = 0; rotVal = 0; });
  rotSlider.addEventListener('touchend', () => { rotSlider.value = 0; rotVal = 0; });

  // --- Keyboard ---
  const pressed = {};
  const keyEls = {};
  document.querySelectorAll('.key[data-key]').forEach(el => {
    keyEls[el.dataset.key] = el;
  });

  window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (['w','a','s','d','q','e','shift'].includes(k)) {
      e.preventDefault();
      pressed[k] = true;
      if (keyEls[k]) keyEls[k].classList.add('active');
    }
  });
  window.addEventListener('keyup', (e) => {
    const k = e.key.toLowerCase();
    delete pressed[k];
    if (keyEls[k]) keyEls[k].classList.remove('active');
  });

  // --- Gamepad ---
  const GP_DEADZONE = 0.15;
  let gpConnected = false;
  const gpEl = document.getElementById('gamepad-status');

  function gpAxis(val) {
    return Math.abs(val) < GP_DEADZONE ? 0 : val;
  }

  function readGamepad() {
    const pads = navigator.getGamepads ? navigator.getGamepads() : [];
    for (let i = 0; i < pads.length; i++) {
      const gp = pads[i];
      if (!gp || !gp.connected) continue;
      const leftX  = gpAxis(gp.axes[0] || 0);
      const leftY  = gpAxis(gp.axes[1] || 0);
      const rightX = gpAxis(gp.axes[2] || 0);
      const boost  = gp.buttons[7] ? gp.buttons[7].value : 0;
      if (leftX || leftY || rightX || boost) {
        return {
          lx: -leftY,
          ly: -leftX,
          az: -rightX,
          boost: boost > 0.1 ? 1.0 : speedMult,
          active: true,
        };
      }
      return { lx: 0, ly: 0, az: 0, boost: speedMult, active: false };
    }
    return null;
  }

  window.addEventListener('gamepadconnected', () => {
    gpConnected = true;
    gpEl.className = 'conn ok';
    gpEl.querySelector('span').textContent = 'Gamepad';
  });
  window.addEventListener('gamepaddisconnected', () => {
    gpConnected = false;
    gpEl.className = 'conn';
    gpEl.querySelector('span').textContent = 'No Gamepad';
  });

  // --- Command loop (20Hz) ---
  setInterval(() => {
    let lx = joyY, ly = -joyX, az = -rotVal;
    let boost = speedMult;

    const gp = gpConnected ? readGamepad() : null;
    if (gp && gp.active) {
      lx = gp.lx;
      ly = gp.ly;
      az = gp.az;
      boost = gp.boost;
    } else if (pressed['w'] || pressed['s'] || pressed['a'] || pressed['d'] || pressed['q'] || pressed['e']) {
      lx = 0; ly = 0; az = 0;
      if (pressed['w']) lx += 1;
      if (pressed['s']) lx -= 1;
      if (pressed['a']) ly += 1;
      if (pressed['d']) ly -= 1;
      if (pressed['q']) az += 1;
      if (pressed['e']) az -= 1;
      boost = pressed['shift'] ? 1.0 : speedMult;
    }

    lx *= boost;
    ly *= boost;
    az *= boost;

    sendCmd(
      parseFloat(lx.toFixed(3)),
      parseFloat(ly.toFixed(3)),
      parseFloat(az.toFixed(3))
    );
  }, 50);

})();
</script>
</body>
</html>
