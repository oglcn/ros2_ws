%YAML:1.0

# ORB-SLAM3 configuration for Pi Camera Module 3 (IMX708) at 640x480
# Tuned for Raspberry Pi 5 performance (reduced features, optimized thresholds)

#--------------------------------------------------------------------------------------------
# Camera Parameters
#--------------------------------------------------------------------------------------------
Camera.type: "PinHole"

# Camera intrinsics (from calibration 2026-06-26, RMS 0.3117)
Camera.fx: 970.127
Camera.fy: 967.951
Camera.cx: 322.642
Camera.cy: 184.253

# Distortion parameters (from calibration)
Camera.k1: -0.079527
Camera.k2: 1.688153
Camera.p1: -0.011446
Camera.p2: -0.003016

# Camera resolution
Camera.width: 640
Camera.height: 480

# Camera frames per second
Camera.fps: 30

# Color order (0: BGR, 1: RGB)
Camera.RGB: 0

#--------------------------------------------------------------------------------------------
# ORB Parameters -- Tuned for Pi 5 (reduced from defaults for performance)
#--------------------------------------------------------------------------------------------

# Number of features per image (default 1000, reduced for Pi 5)
ORBextractor.nFeatures: 600

# Scale factor between levels in the scale pyramid
ORBextractor.scaleFactor: 1.2

# Number of levels in the scale pyramid (default 8, reduced for speed)
ORBextractor.nLevels: 6

# Fast threshold (higher = fewer features but faster)
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters (disabled for headless Pi 5, but values must exist)
#--------------------------------------------------------------------------------------------
Viewer.UseViewer: 0
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
